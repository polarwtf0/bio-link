<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.cdnfonts.com/css/satoshi" rel="stylesheet">
  <style>
    :root {
      --box-shadow: 0 1px 2px 0 #ffffff40;
      --clr-surface: rgba(0, 0, 0, 0.25);
      --clr-text: #ffffff;
      --_radius: 40px;
      --_padding: 0.5em;
    }

    * {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: "Satoshi", sans-serif;
      background: url("assets/kirby.jpg") center / cover no-repeat;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      color: var(--clr-text);
    }

    body>*+* {
      margin-top: 0.5em;
    }

    .card {
      display: flex;
      flex-direction: row;
      gap: 20px;
      padding: var(--_padding);
      min-width: min(400px, 80vw);
      background: var(--clr-surface);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: var(--_radius);
      box-shadow: var(--box-shadow);
    }

    .info-card {
      padding: var(--_padding);
      min-width: min(400px, 80vw);
      background: var(--clr-surface);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: var(--_radius);
      box-shadow: var(--box-shadow);
    }

    .pfp {
      width: 8em;
      height: 8em;
      border-radius: calc(var(--_radius) - var(--_padding));
      box-shadow: var(--box-shadow);
    }

    .info {
      display: block;
    }

    .info h1 {
      font-size: 2.5em;
    }

    .info p {
      font-size: 1.325em;
      opacity: 0.5;
    }

    .logo-card {
      display: flex;

    }

    .logo-container {
      display: flex;
      text-decoration: none;
      gap: 10px;
    }

    .logo-container a {
      text-decoration: none;
    }

    .logo {
      margin-top: 0.6em;
      width: 1.5em;
      height: 1.5em;
      cursor: pointer;
    }

    .text-center {
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="card">

    <img class="pfp" src="assets/kirby.jpg">

    <div class="info">
      <h1>Polar</h1>

      <p id="typewriter"></p>

      <div class="logo-container">
        <a href="https://t.me/polarwtf0">
          <img class="logo" src="assets/telegram.svg" alt="Telegram">
        </a>

        <a href="https://discord.com/users/1518106614719189092">
          <img class="logo" src="assets/discord.svg" alt="Discord">
        </a>

        <a href="https://github.com/polarwtf0">
          <img class="logo" src="assets/github.svg" alt="GitHub">
        </a>
      </div>

    </div>

  </div>

  <div class="info-card">
    <p class="text-center">iOS & Web Developer based in <strong>Switzerland</strong></p>
  </div>

  <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>
  kofiWidgetOverlay.draw('polarwtf', {
    'type': 'floating-chat',
    'floating-chat.donateButton.text': 'Support me',
    'floating-chat.donateButton.background-color': 'rgba(0, 0, 0, 0.25)',
    'floating-chat.donateButton.text-color': '#ffffff',
    'floating-chat.donateButton.backdrop-filter': 'blur(15px)',
     'floating-chat.donateButton.box-shadow': '0 1px 2px 0 #ffffff40'
  });
</script>

  <script>
    const text = "@polar.wtf"
    const zeroWidthSpace = "\u200B"
    let typewriter = document.getElementById("typewriter")
    let i = 0;

    function type() {
      if (i < text.length) {
        typewriter.textContent += text.charAt(i)
        document.title += text.charAt(i)
        ++i
        setTimeout(type, 100)
      } else {
        setTimeout(deleteText, 500)
      }
    }

    function deleteText() {
      if (i > 0) {
        --i
        typewriter.textContent = text.slice(0, i) || zeroWidthSpace
        document.title = text.slice(0, i) || zeroWidthSpace
        setTimeout(deleteText, 100)
      } else {
        type()
      }
    }

    type()
  </script>

</body>

</html>
